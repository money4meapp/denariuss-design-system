<!-- @dsCard group="Type" viewport="700x160" name="Numeric Figures" subtitle="Money values in Sora 800 · KPIs & balances" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); padding: 22px 26px; display: flex; gap: 40px; align-items: flex-end; }
  .fig { font-family: var(--font-display); font-weight: 800; letter-spacing: -0.03em; color: var(--ink); }
  .a { font-size: 46px; }
  .g { background: linear-gradient(120deg,var(--green-bright),var(--green) 55%,var(--green-deep)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .lab { font-family: var(--font-body); font-size: 13px; color: var(--muted); font-weight: 600; margin-top: 4px; }
  .meta { font-family: var(--font-numeric); font-size: 12px; color: var(--faint); position: absolute; bottom: 18px; right: 26px; }
  .col { display: flex; flex-direction: column; }
</style></head>
<body>
  <div class="col"><span class="fig a">R$ 8.400</span><span class="lab">Entradas</span></div>
  <div class="col"><span class="fig a g">R$ 3.270</span><span class="lab">Saldo livre</span></div>
  <div class="meta">Sora · 800 · -0.03em · pt-BR thousands</div>
</body></html>
