<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="Display → caption, the full heading ramp" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); padding: 22px 26px; }
  .r { display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px; }
  .s { font-family: var(--font-display); font-weight: 800; color: var(--ink); letter-spacing: -.02em; line-height: 1.1; }
  .lab { font-family: var(--font-numeric); font-size: 11px; color: var(--faint); white-space: nowrap; }
</style></head>
<body>
  <div class="r"><span class="s" style="font-size:42px">Display</span><span class="lab">--text-display · 40–82px</span></div>
  <div class="r"><span class="s" style="font-size:32px">Section H1</span><span class="lab">--text-h1 · 30–52px</span></div>
  <div class="r"><span class="s" style="font-size:24px">Sub H2</span><span class="lab">--text-h2 · 26–38px</span></div>
  <div class="r"><span class="s" style="font-size:19px">Card H3</span><span class="lab">--text-h3 · 20–27px</span></div>
  <div class="r"><span class="s" style="font-size:16px;font-family:var(--font-body);font-weight:600">Body base 16px</span><span class="lab">--text-base</span></div>
  <div class="r"><span class="s" style="font-size:12.5px;font-family:var(--font-body);font-weight:700;letter-spacing:.05em;color:var(--muted)">CAPTION / META</span><span class="lab">--text-xs</span></div>
</body></html>
