<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); padding: 24px 26px; font-family: var(--font-body); max-width: 640px; }
  .lead { font-size: 20px; color: var(--ink-2); line-height: 1.6; }
  .base { font-size: 16px; color: var(--ink-2); line-height: 1.55; margin-top: 12px; }
  .base strong { color: var(--ink); font-weight: 700; }
  .meta { font-family: var(--font-numeric); font-size: 12px; color: var(--faint); margin-top: 14px; }
</style></head>
<body>
  <p class="lead">Pare de se perder em planilhas quebradas. Você monta o orçamento e prevê o fluxo dos próximos meses.</p>
  <p class="base">Registre gastos <strong>mandando uma mensagem no WhatsApp</strong> — áudio, foto do comprovante ou texto. A IA da Denariuss lança pra você, num só lugar.</p>
  <div class="meta">Hanken Grotesk · 400 / 600 / 700 · line-height 1.55–1.6</div>
</body></html>
