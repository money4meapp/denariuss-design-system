<!-- @dsCard group="Colors" viewport="700x150" name="Navy Surfaces" subtitle="Deep navy canvas the whole product sits on" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: #06080f; padding: 22px 24px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--r-md); border: 1px solid var(--line); padding: 14px; min-height: 104px; display: flex; flex-direction: column; justify-content: flex-end; }
  .name { font-family: var(--font-body); font-weight: 700; font-size: 13.5px; color: var(--ink); }
  .hex  { font-family: var(--font-numeric); font-size: 12px; color: var(--muted); margin-top: 3px; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#0F172A;"><span class="name">Navy</span><span class="hex">#0F172A</span></div>
    <div class="sw" style="background:#0A101F;"><span class="name">Navy Deep</span><span class="hex">#0A101F</span></div>
    <div class="sw" style="background:#121C30;"><span class="name">Navy Soft</span><span class="hex">#121C30</span></div>
    <div class="sw" style="background:#101A2C;"><span class="name">Navy Panel</span><span class="hex">#101A2C</span></div>
  </div>
</body></html>
