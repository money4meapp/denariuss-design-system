<!-- @dsCard group="Colors" viewport="700x150" name="Text Ramp" subtitle="Four-step text hierarchy on dark surfaces" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); padding: 24px 26px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .line { display: flex; align-items: baseline; gap: 14px; }
  .t { font-family: var(--font-body); font-weight: 600; font-size: 20px; flex: 1; }
  .meta { font-family: var(--font-numeric); font-size: 12px; color: var(--faint); }
</style></head>
<body>
  <div class="stack">
    <div class="line"><span class="t" style="color:var(--ink)">Ink — primary text & headings</span><span class="meta">--ink · #EEF4F1</span></div>
    <div class="line"><span class="t" style="color:var(--ink-2)">Ink-2 — lead paragraphs</span><span class="meta">--ink-2 · #C6D2DD</span></div>
    <div class="line"><span class="t" style="color:var(--muted)">Muted — captions & secondary</span><span class="meta">--muted · #93A1B5</span></div>
    <div class="line"><span class="t" style="color:var(--faint)">Faint — meta & disabled</span><span class="meta">--faint · #5E6E84</span></div>
  </div>
</body></html>
