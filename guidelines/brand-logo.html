<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); padding: 0; display: grid; grid-template-columns: 1fr 1fr; }
  .pane { display: flex; align-items: center; justify-content: center; padding: 40px; min-height: 180px; }
  .navy { background: var(--bg); }
  .light { background: #F4F7F5; }
  .pane img { height: 38px; width: auto; }
  .tag { position: absolute; bottom: 10px; font-family: var(--font-numeric); font-size: 10.5px; color: var(--faint); }
  .light .tag { color: #8a978f; }
  .pane { position: relative; }
</style></head>
<body>
  <div class="pane navy"><img src="../assets/denariuss-logo-white.png" alt="Denariuss"><span class="tag">white · on navy</span></div>
  <div class="pane light"><img src="../assets/denariuss-logo-green.png" alt="Denariuss"><span class="tag">green · on light</span></div>
</body></html>
