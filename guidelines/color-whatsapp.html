<!-- @dsCard group="Colors" viewport="700x160" name="WhatsApp Chat Surfaces" subtitle="Bubble palette for the assistant conversation" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--wa-bg); padding: 22px 24px; font-family: var(--font-body); }
  .chat { display: flex; flex-direction: column; gap: 8px; max-width: 320px; }
  .b { padding: 8px 12px; border-radius: 12px; font-size: 14px; color: #e9f1ee; max-width: 80%; }
  .recv { background: var(--wa-recv); border-top-left-radius: 4px; align-self: flex-start; }
  .sent { background: var(--wa-sent); border-top-right-radius: 4px; align-self: flex-end; }
  .meta { font-family: var(--font-numeric); font-size: 11px; color: var(--wa-meta); margin-top: 8px; }
  .legend { position: absolute; right: 24px; top: 22px; display: flex; flex-direction: column; gap: 7px; font-size: 11.5px; color: var(--muted); font-family: var(--font-numeric); }
  .legend span { display: inline-flex; align-items: center; gap: 7px; }
  .legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; border: 1px solid var(--line); }
</style></head>
<body>
  <div class="chat">
    <div class="b sent">almoço 35</div>
    <div class="b recv">Despesa registrada · R$ 35,00 🍽</div>
  </div>
  <div class="legend">
    <span><i style="background:#0A1118"></i>wa-bg</span>
    <span><i style="background:#18242C"></i>wa-head</span>
    <span><i style="background:#1E2C34"></i>wa-recv</span>
    <span><i style="background:#103D30"></i>wa-sent</span>
  </div>
</body></html>
