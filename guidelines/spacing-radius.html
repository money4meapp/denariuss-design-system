<!-- @dsCard group="Spacing" viewport="700x170" name="Radius Scale" subtitle="12 → 34px, pill for interactive elements" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); padding: 24px 26px; display: flex; gap: 16px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 84px; height: 84px; background: var(--green-100); border: 1px solid var(--green-400); }
  .lab { font-family: var(--font-numeric); font-size: 11.5px; color: var(--muted); }
  .lab b { color: var(--ink); }
  .pill { width: 120px; height: 44px; border-radius: 999px; background: linear-gradient(180deg,var(--green-bright),var(--green)); }
</style></head>
<body>
  <div class="col"><div class="box" style="border-radius:12px"></div><span class="lab"><b>sm</b> 12</span></div>
  <div class="col"><div class="box" style="border-radius:18px"></div><span class="lab"><b>md</b> 18</span></div>
  <div class="col"><div class="box" style="border-radius:26px"></div><span class="lab"><b>lg</b> 26</span></div>
  <div class="col"><div class="box" style="border-radius:34px"></div><span class="lab"><b>xl</b> 34</span></div>
  <div class="col"><div class="pill"></div><span class="lab"><b>pill</b> 999</span></div>
</body></html>
