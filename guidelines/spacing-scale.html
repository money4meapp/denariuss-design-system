<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base · 1 → 16 step ramp" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); padding: 24px 26px; display: flex; gap: 14px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { width: 28px; background: linear-gradient(180deg,var(--green-bright),var(--green-deep)); border-radius: 4px; }
  .lab { font-family: var(--font-numeric); font-size: 11px; color: var(--muted); }
</style></head>
<body>
  <div class="col"><div class="bar" style="height:4px"></div><span class="lab">1·4</span></div>
  <div class="col"><div class="bar" style="height:8px"></div><span class="lab">2·8</span></div>
  <div class="col"><div class="bar" style="height:12px"></div><span class="lab">3·12</span></div>
  <div class="col"><div class="bar" style="height:16px"></div><span class="lab">4·16</span></div>
  <div class="col"><div class="bar" style="height:20px"></div><span class="lab">5·20</span></div>
  <div class="col"><div class="bar" style="height:26px"></div><span class="lab">6·26</span></div>
  <div class="col"><div class="bar" style="height:34px"></div><span class="lab">8·34</span></div>
  <div class="col"><div class="bar" style="height:48px"></div><span class="lab">10·48</span></div>
  <div class="col"><div class="bar" style="height:64px"></div><span class="lab">12·64</span></div>
  <div class="col"><div class="bar" style="height:88px"></div><span class="lab">16·96</span></div>
</body></html>
