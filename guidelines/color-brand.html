<!-- @dsCard group="Colors" viewport="700x150" name="Brand Green" subtitle="The $$ — primary accent across the system" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); padding: 22px 24px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--r-md); border: 1px solid var(--line); padding: 14px 14px 16px; min-height: 104px; display: flex; flex-direction: column; justify-content: flex-end; }
  .name { font-family: var(--font-body); font-weight: 700; font-size: 13.5px; color: var(--ink); }
  .hex  { font-family: var(--font-numeric); font-size: 12px; color: var(--ink-2); margin-top: 3px; letter-spacing: .02em; }
  .on   { font-size: 11px; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#2ECF95;"><span class="name" style="color:#06281D">Green</span><span class="hex" style="color:#06281D">#2ECF95</span></div>
    <div class="sw" style="background:#3CE6A6;"><span class="name" style="color:#06281D">Green Bright</span><span class="hex" style="color:#06281D">#3CE6A6</span></div>
    <div class="sw" style="background:#1E9D72;"><span class="name" style="color:#EEF4F1">Green Deep</span><span class="hex" style="color:#EEF4F1">#1E9D72</span></div>
    <div class="sw" style="background:#06281D;"><span class="name" style="color:#3CE6A6">Green Ink</span><span class="hex" style="color:#3CE6A6">#06281D</span></div>
  </div>
</body></html>
