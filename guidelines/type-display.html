<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg); padding: 24px 26px; }
  .big { font-family: var(--font-display); font-weight: 800; font-size: 58px; letter-spacing: -0.035em; line-height: 0.98; color: var(--ink); }
  .big .g { background: linear-gradient(120deg,var(--green-bright),var(--green) 55%,var(--green-deep)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .meta { font-family: var(--font-numeric); font-size: 12px; color: var(--faint); margin-top: 14px; letter-spacing: .02em; }
</style></head>
<body>
  <div class="big">Domine o fluxo<br>do seu <span class="g">dinheiro</span></div>
  <div class="meta">Sora · 800 · -0.035em · clamp(40&ndash;82px)</div>
</body></html>
